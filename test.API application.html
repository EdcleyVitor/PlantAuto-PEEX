<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlantAuto PEEX</title>

<style>
body {
    font-family: Arial;
    background: #f4f7f6;
    padding: 20px;
}

.container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h1 {
    text-align: center;
    color: #2e7d32;
}

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    background: #2e7d32;
    color: white;
    border: none;
}

.slider-container {
    margin-top: 20px;
}

.result {
    margin-top: 20px;
    background: #e8f5e9;
    padding: 15px;
    border-left: 5px solid green;
    display: none;
}
</style>
</head>

<body>

<div class="container">
    <h1>🌱 PlantAuto PEEX</h1>

    <input id="plantInput" placeholder="Digite a planta (ex: tomate)">

    <button onclick="buscar()">Calcular Irrigação</button>

    <!-- POTENCIÔMETRO -->
    <div class="slider-container">
        <label>🌡️ Umidade do Solo (Sensor): <strong id="valorUmidade">50%</strong></label>
        <input type="range" min="0" max="100" value="50" id="sliderUmidade">
    </div>

    <div id="resultado" class="result">
        <h3 id="nome"></h3>
        <p><strong>Fator:</strong> <span id="fator"></span></p>
        <p><strong>Ação:</strong> <span id="acao"></span></p>
        <p><strong>Tempo:</strong> <span id="tempo"></span></p>
    </div>
</div>

<script>
const API_KEY = 'sk-8rAC69c6cb1258bb115655';
const UMIDADE_IDEAL = 70;
const AJUSTE = 2.5;

// Atualiza valor do slider (potenciômetro)
const slider = document.getElementById('sliderUmidade');
const valorTexto = document.getElementById('valorUmidade');

slider.oninput = () => {
    valorTexto.innerText = slider.value + "%";
};

// Tradução
async function traduzir(texto, de, para) {
    try {
        const res = await fetch(
            `https://api.mymemory.translated.net/get?q=${texto}&langpair=${de}|${para}`
        );
        const data = await res.json();
        return data.responseData.translatedText || texto;
    } catch {
        return texto;
    }
}

// Função principal
async function buscar() {
    const nomePT = document.getElementById('plantInput').value.trim();
    if (!nomePT) return alert("Digite uma planta");

    try {
        // traduz
        const nomeEN = await traduzir(nomePT, 'pt', 'en');

        // API plantas (com proxy)
        const res = await fetch(
            `https://corsproxy.io/?https://perenual.com/api/species-list?key=${API_KEY}&q=${nomeEN}`
        );

        const data = await res.json();
        const planta = data.data[0];

        const watering = planta.watering?.toLowerCase() || 'average';

        let fator = 1;
        if (watering.includes('minimum')) fator = 0.5;
        if (watering.includes('frequent')) fator = 1.5;

        // valor do potenciômetro (sensor)
        const umidade = parseInt(slider.value);

        let acao = "";
        let tempo = "";

        if (umidade >= UMIDADE_IDEAL) {
            acao = "✅ Solo já está úmido";
            tempo = "0s";
        } else {
            const tempoCalc = (UMIDADE_IDEAL - umidade) * fator * AJUSTE;
            acao = "💧 Irrigar planta";
            tempo = tempoCalc.toFixed(1) + " segundos";
        }

        // traduz nome final
        const nomeFinal = await traduzir(planta.common_name || nomeEN, 'en', 'pt');

        // UI
        document.getElementById('nome').innerText = nomeFinal;
        document.getElementById('fator').innerText = fator;
        document.getElementById('acao').innerText = acao;
        document.getElementById('tempo').innerText = tempo;

        document.getElementById('resultado').style.display = 'block';

    } catch (err) {
        alert("Erro na API ou conexão");
        console.error(err);
    }
}
</script>

</body>
</html>
